<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Pure black rounded square -->
  <rect x="0" y="0" width="200" height="200" rx="38" ry="38" fill="#000000"/>

  <!-- NT combined mark — white, matched to brand icon proportions -->
  <!--
    Bounding box of mark: x=15..185, y=18..182
    Stroke weight: 22px
    N section: x=15..115 (left-vert 15-37, right-vert 93-115)
    Bracket:   x=115..185 (top-bar 115-185, right-vert 163-185, btm-nub 115-163)
  -->

  <!-- N · left vertical -->
  <rect x="15" y="18" width="22" height="164" rx="3" fill="#ffffff"/>

  <!-- N · diagonal (top-right of left-vert → bottom-left of right-vert) -->
  <polygon points="37,18 59,18 115,182 93,182" fill="#ffffff"/>

  <!-- N · right vertical -->
  <rect x="93" y="18" width="22" height="164" rx="3" fill="#ffffff"/>

  <!-- Bracket · top horizontal bar -->
  <rect x="115" y="18" width="70" height="22" rx="3" fill="#ffffff"/>

  <!-- Bracket · right vertical -->
  <rect x="163" y="40" width="22" height="118" rx="3" fill="#ffffff"/>

  <!-- Bracket · bottom return nub -->
  <rect x="115" y="158" width="48" height="24" rx="3" fill="#ffffff"/>

</svg>

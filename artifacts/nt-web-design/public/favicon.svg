<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Black rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="13" ry="13" fill="url(#bg)"/>

  <!-- Very subtle top-left inner highlight -->
  <rect x="1" y="1" width="62" height="18" rx="12" ry="12" fill="white" fill-opacity="0.03"/>

  <!-- Thin cobalt border ring -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="12.5" ry="12.5"
        fill="none" stroke="#3b82f6" stroke-width="0.9" stroke-opacity="0.5"/>

  <!-- N — left vertical -->
  <rect x="10" y="15" width="7.5" height="34" rx="1.5" fill="white"/>
  <!-- N — right vertical -->
  <rect x="34" y="15" width="7.5" height="34" rx="1.5" fill="white"/>
  <!-- N — diagonal (top-left to bottom-right) -->
  <polygon points="17.5,15 25.5,15 41.5,49 33.5,49" fill="white"/>

  <!-- T — horizontal bar -->
  <rect x="46" y="15" width="10" height="7" rx="1.5" fill="url(#tGrad)"/>
  <!-- T — vertical stem -->
  <rect x="49.5" y="22" width="3" height="27" rx="1.5" fill="url(#tGrad)"/>

  <!-- Cobalt accent dot -->
  <circle cx="57" cy="55" r="2.2" fill="#3b82f6" fill-opacity="0.75"/>
</svg>

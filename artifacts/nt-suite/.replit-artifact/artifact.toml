kind = "web"
previewPath = "/nt-suite/"
title = "NT Business Suite"
version = "1.0.0"
id = "artifacts/nt-suite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nt-suite/" ]
localPort = 24061

[services.development]
run = "pnpm --filter @workspace/nt-suite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nt-suite", "run", "build" ]
publicDir = "artifacts/nt-suite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24061"
BASE_PATH = "/nt-suite/"
